<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>7x Trade Journal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, monospace; background: #0a0a0a; color: #e2e8f0; font-size: 13px; }

    .app { display: flex; flex-direction: column; min-height: 100vh; }

    /* Header */
    .header { background: #0f0f0f; border-bottom: 1px solid #1e1e1e; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .logo { font-size: 15px; font-weight: 700; letter-spacing: 0.05em; color: #fff; }
    .logo span { color: #22d3ee; }
    .stats-bar { display: flex; gap: 20px; flex-wrap: wrap; }
    .stat { text-align: center; }
    .stat-val { font-size: 15px; font-weight: 700; }
    .stat-label { font-size: 10px; color: #64748b; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 1px; }
    .green { color: #22c55e; }
    .red { color: #ef4444; }
    .cyan { color: #22d3ee; }
    .yellow { color: #eab308; }

    /* Nav */
    .nav { background: #0f0f0f; border-bottom: 1px solid #1e1e1e; display: flex; padding: 0 20px; }
    .nav-btn { background: none; border: none; color: #64748b; padding: 10px 16px; cursor: pointer; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; border-bottom: 2px solid transparent; transition: all 0.15s; font-family: inherit; }
    .nav-btn.active { color: #22d3ee; border-bottom-color: #22d3ee; }
    .nav-btn:hover:not(.active) { color: #94a3b8; }

    /* Content */
    .content { flex: 1; padding: 20px; max-width: 1400px; width: 100%; margin: 0 auto; }

    /* Add Trade Button */
    .add-btn { background: #22d3ee; color: #0a0a0a; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 700; font-size: 12px; cursor: pointer; letter-spacing: 0.05em; transition: background 0.15s; font-family: inherit; }
    .add-btn:hover { background: #06b6d4; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: #111; border: 1px solid #1e1e1e; border-radius: 12px; width: 100%; max-width: 640px; max-height: 90vh; overflow-y: auto; padding: 24px; }
    .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 20px; color: #fff; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.08em; }
    .form-group input, .form-group select, .form-group textarea {
      background: #0a0a0a; border: 1px solid #1e1e1e; border-radius: 6px;
      color: #e2e8f0; padding: 8px 10px; font-size: 13px; font-family: inherit;
      transition: border-color 0.15s; outline: none; width: 100%;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #22d3ee; }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .form-group select option { background: #111; }
    .checkbox-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; }
    .checkbox-row input[type=checkbox] { width: 16px; height: 16px; accent-color: #22d3ee; cursor: pointer; flex-shrink: 0; }
    .checkbox-row label { font-size: 12px; color: #94a3b8; cursor: pointer; }
    .checkboxes { display: grid; grid-template-columns: 1fr 1fr; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
    .cancel-btn { background: none; border: 1px solid #1e1e1e; color: #64748b; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: inherit; }
    .save-btn { background: #22d3ee; color: #0a0a0a; border: none; padding: 8px 20px; border-radius: 6px; font-weight: 700; font-size: 12px; cursor: pointer; font-family: inherit; }
    .save-btn:hover { background: #06b6d4; }

    /* Table */
    .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #1e1e1e; }
    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    thead { background: #111; }
    th { padding: 10px 12px; text-align: left; font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 1px solid #1e1e1e; white-space: nowrap; }
    td { padding: 10px 12px; border-bottom: 1px solid #0f0f0f; white-space: nowrap; font-size: 12px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #111; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; letter-spacing: 0.05em; }
    .badge-win { background: #052e16; color: #22c55e; }
    .badge-loss { background: #1c0a0a; color: #ef4444; }
    .badge-be { background: #1c1608; color: #eab308; }
    .badge-long { background: #0c1a2e; color: #60a5fa; }
    .badge-short { background: #1c0e0a; color: #f97316; }
    .setup-badge { background: #1a1a2e; color: #a78bfa; padding: 2px 8px; border-radius: 4px; font-size: 10px; white-space: nowrap; }
    .del-btn { background: none; border: none; color: #374151; cursor: pointer; font-size: 14px; transition: color 0.15s; padding: 2px 6px; }
    .del-btn:hover { color: #ef4444; }
    .check-yes { color: #22c55e; }
    .check-no { color: #374151; }

    /* Calendar */
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .cal-nav { background: none; border: 1px solid #1e1e1e; color: #94a3b8; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 12px; }
    .cal-nav:hover { border-color: #22d3ee44; color: #22d3ee; }
    .cal-title { font-size: 15px; font-weight: 700; color: #fff; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .cal-day-label { text-align: center; font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.08em; padding: 6px 0; }
    .cal-cell { background: #111; border-radius: 6px; min-height: 80px; padding: 6px; border: 1px solid #1a1a1a; cursor: default; }
    .cal-cell.empty { background: transparent; border-color: transparent; }
    .cal-cell.today { border-color: #22d3ee44; }
    .cal-cell.has-trades { cursor: pointer; }
    .cal-cell.has-trades:hover { border-color: #334155; }
    .cal-date { font-size: 11px; color: #64748b; margin-bottom: 4px; }
    .cal-date.today-num { color: #22d3ee; font-weight: 700; }
    .cal-trade { font-size: 10px; padding: 2px 5px; border-radius: 3px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cal-trade.win { background: #052e16; color: #22c55e; }
    .cal-trade.loss { background: #1c0a0a; color: #ef4444; }
    .cal-trade.be { background: #1c1608; color: #eab308; }

    /* Detail panel */
    .detail-panel { background: #111; border: 1px solid #1e1e1e; border-radius: 8px; padding: 20px; margin-top: 16px; }
    .detail-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .detail-title { font-size: 14px; font-weight: 700; color: #fff; }
    .detail-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 16px; }
    .detail-item .detail-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; }
    .detail-item .detail-val { font-size: 13px; color: #e2e8f0; margin-top: 3px; }
    .detail-notes-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; border-top: 1px solid #1e1e1e; padding-top: 16px; }
    .detail-note-block .note-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
    .detail-note-block .note-val { font-size: 12px; color: #94a3b8; line-height: 1.6; }
    .close-detail { background: none; border: none; color: #374151; cursor: pointer; font-size: 18px; padding: 2px 6px; }
    .close-detail:hover { color: #94a3b8; }

    /* Filters */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .section-title { font-size: 13px; font-weight: 700; color: #fff; }
    .filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .filter-select { background: #111; border: 1px solid #1e1e1e; color: #94a3b8; padding: 6px 10px; border-radius: 6px; font-size: 11px; font-family: inherit; outline: none; cursor: pointer; }
    .filter-select:focus { border-color: #22d3ee44; }
    .filter-label { font-size: 10px; color: #374151; text-transform: uppercase; letter-spacing: 0.08em; }

    /* Empty */
    .empty { text-align: center; padding: 60px 20px; color: #374151; }
    .empty-icon { font-size: 32px; margin-bottom: 12px; }
    .empty-text { font-size: 13px; color: #374151; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e1e1e; border-radius: 2px; }

    /* Toast */
    .toast { position: fixed; bottom: 24px; right: 24px; background: #22d3ee; color: #0a0a0a; padding: 10px 18px; border-radius: 8px; font-weight: 700; font-size: 12px; opacity: 0; transition: opacity 0.2s; z-index: 200; pointer-events: none; }
    .toast.show { opacity: 1; }

    @media (max-width: 600px) {
      .stats-bar { gap: 12px; }
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
      .detail-grid { grid-template-columns: repeat(2, 1fr); }
      .detail-notes-grid { grid-template-columns: 1fr; }
      .checkboxes { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="logo">7x <span>JOURNAL</span></div>
    <div class="stats-bar">
      <div class="stat"><div class="stat-val cyan" id="totalTrades">0</div><div class="stat-label">Trades</div></div>
      <div class="stat"><div class="stat-val" id="winRate">0%</div><div class="stat-label">Win Rate</div></div>
      <div class="stat"><div class="stat-val" id="totalPnl">$0</div><div class="stat-label">Total P&L</div></div>
      <div class="stat"><div class="stat-val" id="avgRR">0.0R</div><div class="stat-label">Avg R:R</div></div>
      <div class="stat"><div class="stat-val cyan" id="bestSetup">—</div><div class="stat-label">Best Setup</div></div>
    </div>
    <button class="add-btn" onclick="openModal()">+ Log Trade</button>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="showTab('log', this)">Trade Log</button>
    <button class="nav-btn" onclick="showTab('calendar', this)">Calendar</button>
  </div>

  <div class="content" id="mainContent"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Log New Trade</div>
    <div class="form-grid">
      <div class="form-group"><label>Date</label><input type="date" id="f-date"></div>
      <div class="form-group"><label>Session</label>
        <select id="f-session">
          <option>New York AM</option><option>New York PM</option><option>London</option>
        </select>
      </div>
      <div class="form-group full"><label>Setup Type</label>
        <select id="f-setup">
          <option>Soup Sequence</option>
          <option>Soup Sequence Failed</option>
          <option>Reversal Sequence</option>
          <option>Reversal Sequence Failed</option>
          <option>SMT Resweep</option>
        </select>
      </div>
      <div class="form-group"><label>Direction</label>
        <select id="f-dir"><option>Long</option><option>Short</option></select>
      </div>
      <div class="form-group"><label>Contracts</label><input type="number" id="f-contracts" value="1" min="1"></div>
      <div class="form-group"><label>Entry Price</label><input type="number" id="f-entry" step="0.25" placeholder="21450.25"></div>
      <div class="form-group"><label>Stop Loss</label><input type="number" id="f-sl" step="0.25" placeholder="21420.00"></div>
      <div class="form-group"><label>Target</label><input type="number" id="f-target" step="0.25" placeholder="21510.25"></div>
      <div class="form-group"><label>Exit Price</label><input type="number" id="f-exit" step="0.25" placeholder="21512.00"></div>
      <div class="form-group"><label>Stop Type</label>
        <select id="f-stoptype"><option>Swing Low/High</option><option>Body Low/High</option></select>
      </div>
      <div class="form-group"><label>R:R</label><input type="number" id="f-rr" step="0.1" placeholder="2.1"></div>
      <div class="form-group"><label>Points (neg for loss)</label><input type="number" id="f-points" step="0.25" placeholder="30"></div>
      <div class="form-group"><label>P&L ($)</label><input type="number" id="f-pnl" step="1" placeholder="600"></div>
      <div class="form-group"><label>Confluence Score (1–5)</label><input type="number" id="f-conf" min="1" max="5" value="3"></div>
      <div class="form-group"><label>HTF Narrative</label>
        <select id="f-narrative"><option>Bullish</option><option>Bearish</option></select>
      </div>
      <div class="form-group"><label>Outcome</label>
        <select id="f-outcome"><option>Win</option><option>Loss</option><option>Breakeven</option></select>
      </div>
      <div class="form-group full">
        <div class="checkboxes">
          <div class="checkbox-row"><input type="checkbox" id="f-htf"><label for="f-htf">HTF FVG present</label></div>
          <div class="checkbox-row"><input type="checkbox" id="f-smt"><label for="f-smt">SMT Confirmed</label></div>
          <div class="checkbox-row"><input type="checkbox" id="f-news"><label for="f-news">News Day</label></div>
          <div class="checkbox-row"><input type="checkbox" id="f-valid" checked><label for="f-valid">Trade Valid</label></div>
        </div>
      </div>
      <div class="form-group full"><label>Screenshot</label><input type="file" id="f-screenshot" accept="image/*"></div>
      <div class="form-group full"><label>Notes</label><textarea id="f-notes" placeholder="What happened, market context..."></textarea></div>
      <div class="form-group full"><label>Mistakes</label><textarea id="f-mistakes" placeholder="What went wrong or what you'd do differently..."></textarea></div>
      <div class="form-group full"><label>What I did well</label><textarea id="f-well" placeholder="What worked, good execution..."></textarea></div>
    </div>
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
      <button class="save-btn" onclick="saveTrade()">Save Trade</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'nq_journal_v1';
  let trades = [];
  let currentView = 'log';
  let calendarDate = new Date();
  let selectedTradeId = null;

  // ── Storage ──────────────────────────────────────────────
  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      trades = raw ? JSON.parse(raw) : [];
    } catch(e) { trades = []; }
    if (trades.length === 0) seedSamples();
    renderStats();
    renderView();
  }

  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(trades)); } catch(e) {}
  }

  function seedSamples() {
    trades = [
      { id: 1, date: '2025-01-06', session: 'New York AM', setup: 'SMT Resweep', direction: 'Long', contracts: 2, entry: 21450.25, sl: 21420.00, target: 21510.25, exit: 21512.00, stopType: 'Body Low/High', rr: 2.1, points: 61.75, pnl: 2470, conf: 5, htf: true, smt: true, news: false, valid: true, narrative: 'Bullish', screenshot: '', notes: 'Clean SMT between NQ and ES at 4H FVG. London ran lows overnight.', mistakes: '', well: 'Waited for full confirmation before entry.', outcome: 'Win' },
      { id: 2, date: '2025-01-06', session: 'New York AM', setup: 'Reversal Sequence', direction: 'Short', contracts: 1, entry: 21530.00, sl: 21555.00, target: 21470.00, exit: 21555.00, stopType: 'Swing Low/High', rr: -1.0, points: -25, pnl: -500, conf: 2, htf: true, smt: false, news: false, valid: false, narrative: 'Bearish', screenshot: '', notes: 'Took reversal without SMT confirmation. Only 2 confluence factors.', mistakes: 'Should have passed — not enough confluence. FOMO entry.', well: '', outcome: 'Loss' },
      { id: 3, date: '2025-01-13', session: 'New York AM', setup: 'Soup Sequence', direction: 'Long', contracts: 2, entry: 21310.25, sl: 21290.00, target: 21370.25, exit: 21368.50, stopType: 'Swing Low/High', rr: 2.9, points: 58.25, pnl: 2330, conf: 4, htf: true, smt: false, news: false, valid: true, narrative: 'Bullish', screenshot: '', notes: 'Sweep of 15m low, rebalanced into 1m FVG, continuation to 4H target.', mistakes: '', well: 'Held to target despite drawdown mid-trade.', outcome: 'Win' },
      { id: 4, date: '2025-01-27', session: 'New York AM', setup: 'Soup Sequence Failed', direction: 'Short', contracts: 1, entry: 21620.00, sl: 21645.00, target: 21560.00, exit: 21562.00, stopType: 'Body Low/High', rr: 2.3, points: 58, pnl: 1160, conf: 4, htf: true, smt: true, news: true, valid: true, narrative: 'Bearish', screenshot: '', notes: 'FOMC day. Failed soup setup into HTF FVG. Resweep confirmed.', mistakes: '', well: 'Read London session correctly pre-market.', outcome: 'Win' },
    ];
    save();
  }

  // ── Stats ─────────────────────────────────────────────────
  function renderStats() {
    const valid = trades.filter(t => t.valid);
    const wins = valid.filter(t => t.outcome === 'Win');
    const totalPnl = trades.reduce((s, t) => s + (t.pnl || 0), 0);
    const winTrades = trades.filter(t => t.outcome === 'Win');
    const avgRR = winTrades.length ? winTrades.reduce((s, t) => s + (t.rr || 0), 0) / winTrades.length : 0;

    const setups = {};
    trades.forEach(t => {
      if (!setups[t.setup]) setups[t.setup] = { wins: 0, total: 0 };
      setups[t.setup].total++;
      if (t.outcome === 'Win') setups[t.setup].wins++;
    });
    let bestSetup = '—', bestRate = 0;
    Object.entries(setups).forEach(([s, d]) => {
      const r = d.total >= 2 ? d.wins / d.total : 0;
      if (r > bestRate) { bestRate = r; bestSetup = s.split(' ').slice(0, 2).join(' '); }
    });

    document.getElementById('totalTrades').textContent = trades.length;
    const wr = valid.length ? Math.round(wins.length / valid.length * 100) : 0;
    const wrEl = document.getElementById('winRate');
    wrEl.textContent = wr + '%';
    wrEl.className = 'stat-val ' + (wr >= 50 ? 'green' : 'red');
    const pnlEl = document.getElementById('totalPnl');
    pnlEl.textContent = (totalPnl >= 0 ? '+' : '') + '$' + Math.abs(totalPnl).toLocaleString();
    pnlEl.className = 'stat-val ' + (totalPnl >= 0 ? 'green' : 'red');
    document.getElementById('avgRR').textContent = avgRR.toFixed(1) + 'R';
    document.getElementById('bestSetup').textContent = bestSetup;
  }

  // ── Navigation ────────────────────────────────────────────
  function showTab(view, btn) {
    currentView = view;
    selectedTradeId = null;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderView();
  }

  function renderView() {
    if (currentView === 'log') renderLog();
    else renderCalendar();
  }

  // ── Trade Log ─────────────────────────────────────────────
  function renderLog() {
    const content = document.getElementById('mainContent');
    content.innerHTML = `
      <div class="section-header">
        <div class="section-title">Trade Log</div>
      </div>
      <div class="filter-row">
        <span class="filter-label">Filter:</span>
        <select class="filter-select" onchange="applyFilters()" id="f-outcome-filter">
          <option value="">All Outcomes</option><option>Win</option><option>Loss</option><option>Breakeven</option>
        </select>
        <select class="filter-select" onchange="applyFilters()" id="f-setup-filter">
          <option value="">All Setups</option>
          <option>Soup Sequence</option><option>Soup Sequence Failed</option>
          <option>Reversal Sequence</option><option>Reversal Sequence Failed</option><option>SMT Resweep</option>
        </select>
        <select class="filter-select" onchange="applyFilters()" id="f-session-filter">
          <option value="">All Sessions</option><option>New York AM</option><option>New York PM</option><option>London</option>
        </select>
        <select class="filter-select" onchange="applyFilters()" id="f-valid-filter">
          <option value="">Valid + Invalid</option><option value="true">Valid only</option><option value="false">Invalid only</option>
        </select>
      </div>
      <div id="tableContainer"></div>
      <div id="logDetail"></div>
    `;
    applyFilters();
  }

  function applyFilters() {
    const outcome = document.getElementById('f-outcome-filter')?.value || '';
    const setup = document.getElementById('f-setup-filter')?.value || '';
    const session = document.getElementById('f-session-filter')?.value || '';
    const valid = document.getElementById('f-valid-filter')?.value || '';
    const filtered = trades.filter(t =>
      (!outcome || t.outcome === outcome) &&
      (!setup || t.setup === setup) &&
      (!session || t.session === session) &&
      (valid === '' || String(t.valid) === valid)
    );
    renderTable(filtered);
  }

  function renderTable(data) {
    const container = document.getElementById('tableContainer');
    if (!data.length) {
      container.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">No trades match. Log your first trade using the button above.</div></div>';
      return;
    }
    const rows = data.map(t => `
      <tr onclick="showLogDetail(${t.id})" style="cursor:pointer">
        <td>${t.date}</td>
        <td>${t.session}</td>
        <td><span class="setup-badge">${t.setup}</span></td>
        <td><span class="badge ${t.direction === 'Long' ? 'badge-long' : 'badge-short'}">${t.direction}</span></td>
        <td>${t.contracts}</td>
        <td>${t.entry.toFixed(2)}</td>
        <td style="color:${t.points >= 0 ? '#22c55e' : '#ef4444'}">${t.points >= 0 ? '+' : ''}${t.points}</td>
        <td style="color:${t.pnl >= 0 ? '#22c55e' : '#ef4444'}">${t.pnl >= 0 ? '+' : '-'}$${Math.abs(t.pnl).toLocaleString()}</td>
        <td style="color:${t.rr >= 0 ? '#22c55e' : '#ef4444'}">${t.rr >= 0 ? '+' : ''}${t.rr}R</td>
        <td>${t.conf}/5</td>
        <td class="${t.htf ? 'check-yes' : 'check-no'}">${t.htf ? '✓' : '—'}</td>
        <td class="${t.smt ? 'check-yes' : 'check-no'}">${t.smt ? '✓' : '—'}</td>
        <td class="${t.valid ? 'check-yes' : 'check-no'}">${t.valid ? '✓' : '✕'}</td>
        <td><span class="badge ${t.outcome === 'Win' ? 'badge-win' : t.outcome === 'Loss' ? 'badge-loss' : 'badge-be'}">${t.outcome}</span></td>
        <td><button class="del-btn" onclick="event.stopPropagation(); deleteTrade(${t.id})">✕</button></td>
      </tr>
    `).join('');

    container.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th><th>Session</th><th>Setup</th><th>Dir</th><th>Cts</th>
              <th>Entry</th><th>Points</th><th>P&L</th><th>R:R</th><th>Conf</th>
              <th>HTF FVG</th><th>SMT</th><th>Valid</th><th>Outcome</th><th></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
  }

  function showLogDetail(id) {
    if (selectedTradeId === id) { selectedTradeId = null; document.getElementById('logDetail').innerHTML = ''; return; }
    selectedTradeId = id;
    const t = trades.find(x => x.id === id);
    if (!t) return;
    document.getElementById('logDetail').innerHTML = buildDetailHTML(t);
  }

  // ── Calendar ──────────────────────────────────────────────
  function renderCalendar() {
    const content = document.getElementById('mainContent');
    const year = calendarDate.getFullYear();
    const month = calendarDate.getMonth();
    const monthName = calendarDate.toLocaleString('default', { month: 'long', year: 'numeric' });
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = new Date();

    const tradesByDate = {};
    trades.forEach(t => {
      if (!tradesByDate[t.date]) tradesByDate[t.date] = [];
      tradesByDate[t.date].push(t);
    });

    const dayLabels = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d =>
      `<div class="cal-day-label">${d}</div>`
    ).join('');

    let cells = '';
    for (let i = 0; i < firstDay; i++) cells += '<div class="cal-cell empty"></div>';

    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === d;
      const dayTrades = tradesByDate[dateStr] || [];
      const hasTrades = dayTrades.length > 0;
      const pills = dayTrades.map(t =>
        `<div class="cal-trade ${t.outcome === 'Win' ? 'win' : t.outcome === 'Loss' ? 'loss' : 'be'}" title="${t.setup} | ${t.points >= 0 ? '+' : ''}${t.points}pts | ${t.pnl >= 0 ? '+' : '-'}$${Math.abs(t.pnl).toLocaleString()}">${t.setup.split(' ')[0]} ${t.pnl >= 0 ? '+' : '-'}$${Math.abs(t.pnl)}</div>`
      ).join('');
      cells += `<div class="cal-cell${isToday ? ' today' : ''}${hasTrades ? ' has-trades' : ''}" ${hasTrades ? `onclick="showCalDetail('${dateStr}')"` : ''}>
        <div class="cal-date${isToday ? ' today-num' : ''}">${d}</div>${pills}
      </div>`;
    }

    content.innerHTML = `
      <div class="cal-header">
        <button class="cal-nav" onclick="changeMonth(-1)">← Prev</button>
        <div class="cal-title">${monthName}</div>
        <button class="cal-nav" onclick="changeMonth(1)">Next →</button>
      </div>
      <div class="cal-grid">${dayLabels}${cells}</div>
      <div id="calDetail"></div>
    `;
  }

  function changeMonth(dir) {
    calendarDate.setMonth(calendarDate.getMonth() + dir);
    renderCalendar();
  }

  function showCalDetail(dateStr) {
    const dayTrades = trades.filter(t => t.date === dateStr);
    if (!dayTrades.length) return;
    const detail = document.getElementById('calDetail');
    detail.innerHTML = dayTrades.map(t => buildDetailHTML(t)).join('');
  }

  // ── Detail HTML ───────────────────────────────────────────
  function buildDetailHTML(t) {
    return `
      <div class="detail-panel">
        <div class="detail-header">
          <div class="detail-title">${t.date} · ${t.setup} · <span style="color:${t.outcome==='Win'?'#22c55e':t.outcome==='Loss'?'#ef4444':'#eab308'}">${t.outcome}</span></div>
          <button class="close-detail" onclick="this.closest('.detail-panel').remove()">✕</button>
        </div>
        <div class="detail-grid">
          <div class="detail-item"><div class="detail-label">Session</div><div class="detail-val">${t.session}</div></div>
          <div class="detail-item"><div class="detail-label">Direction</div><div class="detail-val">${t.direction}</div></div>
          <div class="detail-item"><div class="detail-label">Contracts</div><div class="detail-val">${t.contracts}</div></div>
          <div class="detail-item"><div class="detail-label">Stop Type</div><div class="detail-val">${t.stopType}</div></div>
          <div class="detail-item"><div class="detail-label">Entry</div><div class="detail-val">${t.entry.toFixed(2)}</div></div>
          <div class="detail-item"><div class="detail-label">Stop Loss</div><div class="detail-val">${t.sl.toFixed(2)}</div></div>
          <div class="detail-item"><div class="detail-label">Target</div><div class="detail-val">${t.target.toFixed(2)}</div></div>
          <div class="detail-item"><div class="detail-label">Exit</div><div class="detail-val">${t.exit.toFixed(2)}</div></div>
          <div class="detail-item"><div class="detail-label">Points</div><div class="detail-val" style="color:${t.points>=0?'#22c55e':'#ef4444'}">${t.points>=0?'+':''}${t.points}</div></div>
          <div class="detail-item"><div class="detail-label">P&L</div><div class="detail-val" style="color:${t.pnl>=0?'#22c55e':'#ef4444'}">${t.pnl>=0?'+':'-'}$${Math.abs(t.pnl).toLocaleString()}</div></div>
          <div class="detail-item"><div class="detail-label">R:R</div><div class="detail-val">${t.rr}R</div></div>
          <div class="detail-item"><div class="detail-label">Confluence</div><div class="detail-val">${t.conf}/5</div></div>
          <div class="detail-item"><div class="detail-label">HTF FVG</div><div class="detail-val ${t.htf?'check-yes':'check-no'}">${t.htf?'✓ Yes':'— No'}</div></div>
          <div class="detail-item"><div class="detail-label">SMT</div><div class="detail-val ${t.smt?'check-yes':'check-no'}">${t.smt?'✓ Yes':'— No'}</div></div>
          <div class="detail-item"><div class="detail-label">News Day</div><div class="detail-val ${t.news?'check-yes':'check-no'}">${t.news?'✓ Yes':'— No'}</div></div>
          <div class="detail-item"><div class="detail-label">Valid Trade</div><div class="detail-val ${t.valid?'check-yes':'red'}">${t.valid?'✓ Yes':'✕ No'}</div></div>
        </div>
        <div class="detail-notes-grid">
          ${t.notes ? `<div class="detail-note-block"><div class="note-label">Notes</div><div class="note-val">${t.notes}</div></div>` : ''}
          ${t.mistakes ? `<div class="detail-note-block"><div class="note-label">Mistakes</div><div class="note-val">${t.mistakes}</div></div>` : ''}
          ${t.well ? `<div class="detail-note-block"><div class="note-label">What I did well</div><div class="note-val">${t.well}</div></div>` : ''}
        </div>
        ${t.screenshot ? `<div style="margin-top:12px"><img src="${t.screenshot}" style="max-width:100%;border-radius:6px;border:1px solid #1e1e1e;max-height:300px"></div>` : ''}
      </div>
    `;
  }

  // ── Modal ─────────────────────────────────────────────────
  function openModal() {
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  function saveTrade() {
    const points = parseFloat(document.getElementById('f-points').value) || 0;
    const contracts = parseInt(document.getElementById('f-contracts').value) || 1;
    const pnlInput = document.getElementById('f-pnl').value;
    const pnl = pnlInput ? Math.round(parseFloat(pnlInput)) : Math.round(points * contracts * 20);
    const screenshotFile = document.getElementById('f-screenshot').files[0];
    let screenshot = '';

    if (screenshotFile) {
      const reader = new FileReader();
      reader.onload = (e) => {
        screenshot = e.target.result;
        createTrade(screenshot);
      };
      reader.readAsDataURL(screenshotFile);
      return;
    } else {
      createTrade('');
    }

    function createTrade(screenshot) {
      const trade = {
      id: Date.now(),
      date: document.getElementById('f-date').value,
      session: document.getElementById('f-session').value,
      setup: document.getElementById('f-setup').value,
      direction: document.getElementById('f-dir').value,
      contracts,
      entry: parseFloat(document.getElementById('f-entry').value) || 0,
      sl: parseFloat(document.getElementById('f-sl').value) || 0,
      target: parseFloat(document.getElementById('f-target').value) || 0,
      exit: parseFloat(document.getElementById('f-exit').value) || 0,
      stopType: document.getElementById('f-stoptype').value,
      rr: parseFloat(document.getElementById('f-rr').value) || 0,
      points,
      pnl,
      conf: parseInt(document.getElementById('f-conf').value) || 3,
      htf: document.getElementById('f-htf').checked,
      smt: document.getElementById('f-smt').checked,
      news: document.getElementById('f-news').checked,
      valid: document.getElementById('f-valid').checked,
      narrative: document.getElementById('f-narrative').value,
      outcome: document.getElementById('f-outcome').value,
      screenshot: screenshot,
      notes: document.getElementById('f-notes').value,
      mistakes: document.getElementById('f-mistakes').value,
      well: document.getElementById('f-well').value,
    };

      trades.unshift(trade);
      save();
      renderStats();
      renderView();
      closeModal();
      showToast('Trade saved ✓');

      // reset fields
      ['f-entry','f-sl','f-target','f-exit','f-rr','f-points','f-pnl','f-notes','f-mistakes','f-well'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      document.getElementById('f-screenshot').value = '';
      ['f-htf','f-smt','f-news'].forEach(id => { document.getElementById(id).checked = false; });
      document.getElementById('f-valid').checked = true;
      document.getElementById('f-conf').value = 3;
      document.getElementById('f-contracts').value = 1;
    }
  }

  function deleteTrade(id) {
    if (!confirm('Delete this trade?')) return;
    trades = trades.filter(t => t.id !== id);
    save();
    renderStats();
    renderView();
    showToast('Trade deleted');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  load();
</script>
</body>
</html>
